<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tyler's University video player</title>
    <style>
        :root {
            --bg-grey: #c0c0c0;
            --retro-red: #ff0000;
            --btn-grad: radial-gradient(circle at 35% 35%, #ffffff 0%, #a3a3a3 50%, #666666 100%);
            --win-border: 2px solid #fff;
            --win-shadow: 2px solid #444;
        }

        body {
            background-color: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            font-family: Arial, sans-serif;
            touch-action: manipulation;
            user-select: none;
        }

        h1 { color: var(--bg-grey); font-family: 'Courier New', monospace; margin-bottom: 20px; text-shadow: 2px 2px #000; }

        #toast {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); color: white; padding: 8px 16px;
            border-radius: 5px; font-weight: bold; z-index: 100; opacity: 0;
            /* TRANSITION REMOVED */
            border: 1px solid var(--retro-red);
            pointer-events: none;
        }

        .import-section { margin-bottom: 20px; display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; }
        
        .file-label {
            background: var(--bg-grey);
            border-top: var(--win-border); border-left: var(--win-border);
            border-bottom: var(--win-shadow); border-right: var(--win-shadow);
            padding: 10px 20px; cursor: pointer; font-weight: bold; font-size: 14px;
            color: #000; text-transform: uppercase; box-shadow: 3px 3px 10px rgba(0,0,0,0.5);
        }

        input[type="file"] { display: none; }

        .player-container {
            width: 100%; max-width: 950px; background: #000;
            position: relative; overflow: hidden; border: 2px solid #555; aspect-ratio: 16 / 9;
        }

        /* TRANSITIONS REMOVED FROM VIDEO FILTERS */
        video { width: 100%; height: 100%; cursor: pointer; }
        .res-144 { filter: blur(4px) contrast(1.2); transform: scale(1.02); }
        .res-480 { filter: blur(1px); }

        #loadingIcon {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 60px; height: 60px;
            border: 8px solid #333; border-top: 8px solid var(--retro-red);
            border-radius: 50%; display: none;
            z-index: 35; animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }

        #settingsMenu {
            position: absolute; bottom: 70px; right: 20px;
            background: var(--bg-grey);
            border-top: var(--win-border); border-left: var(--win-border);
            border-bottom: var(--win-shadow); border-right: var(--win-shadow);
            padding: 5px; z-index: 40; width: 220px; display: none;
            box-shadow: 4px 4px 10px rgba(0,0,0,0.5);
            /* NO ANIMATION */
        }

        .menu-item {
            padding: 8px 12px; border-bottom: 1px solid #888;
            color: #000; cursor: pointer; font-size: 13px; font-weight: bold;
            display: flex; justify-content: space-between; align-items: center;
        }
        .menu-item:hover { background: #000080; color: white; }
        .menu-item select { font-size: 11px; font-weight: bold; }

        .controls {
            display: flex; align-items: center;
            background: linear-gradient(to bottom, #cfcfcf 0%, #9e9e9e 100%);
            padding: 10px 15px; gap: 10px;
            position: absolute; bottom: 0; left: 0; right: 0;
            z-index: 20; border-top: 1px solid #fff;
            /* TRANSITION REMOVED - INSTANT APPEARANCE */
        }
        .controls.hidden { display: none; }

        .btn-circle {
            width: 48px; height: 48px; border-radius: 50%;
            background: var(--btn-grad); border: 2px solid #555;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            box-shadow: 1px 1px 3px rgba(0,0,0,0.6); flex-shrink: 0;
        }
        .btn-small {
            width: 35px; height: 35px; border-radius: 50%;
            background: var(--btn-grad); border: 2px solid #555;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-family: monospace; font-size: 18px; color: #333;
            flex-shrink: 0;
        }

        .play-icon { width: 0; height: 0; border-top: 8px solid transparent; border-bottom: 8px solid transparent; border-left: 12px solid #333; margin-left: 4px; }
        .pause-icon { display: flex; gap: 3px; }
        .pause-bar { width: 4px; height: 16px; background: #333; }
        .stop-square { width: 12px; height: 12px; background: #333; }

        .fs-icon { width: 16px; height: 12px; border: 2px solid #333; position: relative; }
        .fs-icon::after { content: ''; position: absolute; top: -2px; left: 2px; right: 2px; height: 2px; background: #333; }

        .progress-wrapper {
            flex: 1; height: 16px; background: #333;
            border: 1px solid #000; border-bottom: 1px solid #eee;
            position: relative; cursor: pointer;
        }
        .progress-filled { height: 100%; background: var(--retro-red); width: 0%; pointer-events: none;}
        .handle {
            position: absolute; top: -6px; left: 0; width: 32px; height: 26px;
            background: #d1d1d1; transform: translateX(-50%);
            clip-path: polygon(20% 0%, 80% 0%, 100% 50%, 80% 100%, 20% 100%, 0% 50%);
            border: 1px solid #444; pointer-events: none;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.4);
        }

        .time-display { font-family: 'Courier New', monospace; font-size: 15px; font-weight: bold; color: #222; white-space: nowrap; }

        .volume-group { display: flex; flex-direction: column; align-items: center; gap: 4px; min-width: 90px; }
        .vol-bars { display: flex; align-items: flex-end; gap: 2px; height: 16px; }
        .vol-bar { width: 3px; background: #777; }
        .vol-bar.active { background: #000; }
        .vol-slider { -webkit-appearance: none; width: 80px; height: 3px; background: #555; outline: none; border-bottom: 1px solid #fff; cursor: pointer; }
        .vol-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 9px; height: 12px; background: #999; border: 1px solid #444; }

        #restartOverlay {
            position: absolute; top:0; left:0; right:0; bottom:0;
            background: rgba(0,0,0,0.7); display: none;
            justify-content: center; align-items: center; z-index: 30;
        }
    </style>
</head>
<body>

<div id="toast">ACTION</div>

<h1>Tyler's University video player</h1>

<div class="import-section">
    <label class="file-label">Choose Video<input type="file" id="videoImport" accept=".mp4,.mkv,.avi,.wmv,.mov,.webm"></label>
    <label class="file-label" style="background: #a3c2ff;">Choose Music<input type="file" id="audioImport" accept=".mp3,.wav,.aac,.flac,.m4a,.ogg,.wma,.mp1,.mp2"></label>
</div>

<div class="player-container" id="playerWrapper">
    <div id="loadingIcon"></div>
    
    <div id="settingsMenu">
        <div class="menu-item" id="loopToggle">Loop <span>OFF</span></div>
        <div class="menu-item">
            Resolution
            <select id="resSelect">
                <option value="auto">Auto (Native)</option>
                <option value="1080">1080p</option>
                <option value="720">720p</option>
                <option value="480">480p</option>
                <option value="144">144p (Retro)</option>
            </select>
        </div>
        <div class="menu-item">
            Animation
            <select id="animSelect">
                <option value="none">None</option>
                <option value="smooth">Smooth</option>
                <option value="skip">Skip</option>
            </select>
        </div>
        <div class="menu-item" onclick="location.reload()">Reset Player</div>
    </div>

    <div id="restartOverlay"><div class="btn-circle" id="restartAction" style="width:70px; height:70px;"><div class="play-icon" style="border-left-width:25px; border-top-width:15px; border-bottom-width:15px;"></div></div></div>

    <video id="mainVideo" playsinline></video>
    
    <div class="controls" id="controlBar">
        <button class="btn-circle" id="playBtn"><div id="playIcon" class="play-icon"></div></button>
        <button class="btn-small" id="stopBtn"><div class="stop-square"></div></button>
        <button class="btn-small" onclick="seek(-5)">&lt;</button>
        <button class="btn-small" onclick="seek(5)">&gt;</button>
        <div class="time-display"><span id="current">00:00</span> / <span id="total">0:00</span></div>
        <div class="progress-wrapper" id="progCont">
            <div class="progress-filled" id="progFill"></div>
            <div class="handle" id="handle"></div>
        </div>
        <div class="volume-group">
            <div class="vol-bars" id="volBars"></div>
            <input type="range" class="vol-slider" id="volInput" min="0" max="1" step="0.01" value="1">
        </div>
        <button class="btn-small" id="settingsBtn">⚙</button>
        <button class="btn-small" id="fsBtn"><div class="fs-icon"></div></button>
    </div>
</div>

<script>
    const video = document.getElementById('mainVideo');
    const playIcon = document.getElementById('playIcon');
    const progFill = document.getElementById('progFill');
    const handle = document.getElementById('handle');
    const progCont = document.getElementById('progCont');
    const volInput = document.getElementById('volInput');
    const animSelect = document.getElementById('animSelect');
    const settingsMenu = document.getElementById('settingsMenu');
    const loopToggle = document.getElementById('loopToggle');
    let isDragging = false;
    let pendingPos = 0;

    // Build volume bars
    for(let i=1; i<=12; i++) {
        let bar = document.createElement('div');
        bar.className = 'vol-bar active';
        bar.style.height = (i * 1.3 + 2) + 'px';
        document.getElementById('volBars').appendChild(bar);
    }

    // LOOP LOGIC
    loopToggle.onclick = () => {
        video.loop = !video.loop;
        loopToggle.querySelector('span').textContent = video.loop ? "ON" : "OFF";
    };

    // HOTKEYS
    window.addEventListener('keydown', (e) => {
        if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
        if (e.code === 'ArrowRight') { seek(5); }
        if (e.code === 'ArrowLeft') { seek(-5); }
        if (e.code === 'KeyM') { video.muted = !video.muted; }
        if (e.code === 'KeyF') { toggleFS(); }
    });

    function updateProgress(e) {
        if (!video.duration) return;
        const rect = progCont.getBoundingClientRect();
        const clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
        let pos = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
        pendingPos = pos;
        
        const mode = animSelect.value;
        const percent = pos * 100;

        if (mode !== 'none') {
            progFill.style.width = `${percent}%`;
            handle.style.left = `${percent}%`;
        }
        if (mode === 'smooth') {
            video.currentTime = pos * video.duration;
        }
    }

    progCont.addEventListener('mousedown', (e) => { isDragging = true; updateProgress(e); });
    window.addEventListener('mousemove', (e) => { if (isDragging) updateProgress(e); });
    window.addEventListener('mouseup', () => { 
        if (isDragging && animSelect.value !== 'smooth') {
            video.currentTime = pendingPos * video.duration;
            progFill.style.width = `${pendingPos * 100}%`;
            handle.style.left = `${pendingPos * 100}%`;
        }
        isDragging = false; 
    });

    video.addEventListener('timeupdate', () => {
        if (!isDragging && video.duration) {
            const percent = (video.currentTime / video.duration) * 100;
            progFill.style.width = `${percent}%`;
            handle.style.left = `${percent}%`;
        }
        document.getElementById('current').textContent = formatTime(video.currentTime);
    });

    function toggleFS() {
        const wrap = document.getElementById('playerWrapper');
        if (!document.fullscreenElement) wrap.requestFullscreen();
        else document.exitFullscreen();
    }

    document.getElementById('fsBtn').onclick = toggleFS;

    function togglePlay() { video.paused ? video.play() : video.pause(); updateIcon(!video.paused); }
    function updateIcon(playing) {
        playIcon.className = playing ? "pause-icon" : "play-icon";
        playIcon.innerHTML = playing ? '<div class="pause-bar"></div><div class="pause-bar"></div>' : '';
    }
    function seek(amount) { video.currentTime += amount; }
    function formatTime(s) {
        if (isNaN(s)) return "0:00";
        let m = Math.floor(s / 60); let sec = Math.floor(s % 60);
        return `${m}:${sec.toString().padStart(2, '0')}`;
    }

    document.getElementById('playBtn').onclick = togglePlay;
    document.getElementById('settingsBtn').onclick = (e) => {
        e.stopPropagation();
        settingsMenu.style.display = settingsMenu.style.display === 'block' ? 'none' : 'block';
    };

    volInput.oninput = (e) => { 
        video.volume = e.target.value;
        document.querySelectorAll('.vol-bar').forEach((b, i) => b.classList.toggle('active', i < video.volume * 12));
    };

    document.getElementById('videoImport').onchange = function() { 
        if (this.files[0]) { video.src = URL.createObjectURL(this.files[0]); video.play(); updateIcon(true); }
    };

    video.onloadedmetadata = () => document.getElementById('total').textContent = formatTime(video.duration);
</script>
</body>
</html>
