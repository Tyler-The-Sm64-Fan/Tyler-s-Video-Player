<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tyler's Web Video Player</title>
    <style>
        :root {
            --bg-grey: #c0c0c0;
            --retro-red: #ff0000;
            --btn-grad: radial-gradient(circle at 35% 35%, #ffffff 0%, #a3a3a3 50%, #666666 100%);
            --win-border: 2px solid #fff;
            --win-shadow: 2px solid #444;
        }

        body {
            background-color: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            font-family: Arial, sans-serif;
            touch-action: manipulation;
        }

        h1 { color: var(--bg-grey); font-family: 'Courier New', monospace; margin-bottom: 20px; text-shadow: 2px 2px #000; }

        .import-section { margin-bottom: 20px; display: flex; gap: 15px; }
        
        .file-label {
            background: var(--bg-grey);
            border-top: var(--win-border); border-left: var(--win-border);
            border-bottom: var(--win-shadow); border-right: var(--win-shadow);
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            color: #000;
            text-transform: uppercase;
            box-shadow: 3px 3px 10px rgba(0,0,0,0.5);
        }
        .file-label:active {
            border-top: var(--win-shadow); border-left: var(--win-shadow);
            border-bottom: var(--win-border); border-right: var(--win-border);
            transform: translate(1px, 1px);
        }
        input[type="file"] { display: none; }

        .player-container {
            width: 100%;
            max-width: 950px;
            background: #000;
            position: relative;
            overflow: hidden;
            border: 2px solid #555;
            aspect-ratio: 16 / 9;
        }

        video { width: 100%; height: 100%; cursor: pointer; }

        /* LOADING ICON */
        #loadingIcon {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 60px; height: 60px;
            border: 8px solid #333;
            border-top: 8px solid var(--retro-red);
            border-radius: 50%;
            display: none;
            z-index: 35;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* SETTINGS MENU */
        #settingsMenu {
            position: absolute;
            bottom: 70px; right: 20px;
            background: var(--bg-grey);
            border-top: var(--win-border); border-left: var(--win-border);
            border-bottom: var(--win-shadow); border-right: var(--win-shadow);
            padding: 5px; z-index: 40; width: 180px; display: none;
            box-shadow: 4px 4px 10px rgba(0,0,0,0.5);
        }

        .menu-item {
            padding: 8px 12px; border-bottom: 1px solid #888;
            color: #000; cursor: pointer; font-size: 13px; font-weight: bold;
            display: flex; justify-content: space-between; align-items: center;
        }
        .menu-item:hover { background: #000080; color: white; }

        /* CONTROL BAR */
        .controls {
            display: flex; align-items: center;
            background: linear-gradient(to bottom, #cfcfcf 0%, #9e9e9e 100%);
            padding: 10px 15px; gap: 10px;
            position: absolute; bottom: 0; left: 0; right: 0;
            z-index: 20; border-top: 1px solid #fff;
            transition: transform 0.3s ease;
        }
        .controls.hidden { transform: translateY(100%); }

        /* BUTTONS */
        .btn-circle {
            width: 48px; height: 48px; border-radius: 50%;
            background: var(--btn-grad); border: 2px solid #555;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            box-shadow: 1px 1px 3px rgba(0,0,0,0.6); flex-shrink: 0;
        }
        .btn-small {
            width: 35px; height: 35px; border-radius: 50%;
            background: var(--btn-grad); border: 2px solid #555;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-family: monospace; font-size: 18px; color: #333;
            flex-shrink: 0;
        }

        .play-icon { width: 0; height: 0; border-top: 8px solid transparent; border-bottom: 8px solid transparent; border-left: 12px solid #333; margin-left: 4px; }
        .pause-icon { display: flex; gap: 3px; }
        .pause-bar { width: 4px; height: 16px; background: #333; }
        .stop-square { width: 12px; height: 12px; background: #333; }

        .fs-icon {
            width: 16px; height: 12px;
            border-top: 2px solid #333; border-bottom: 2px solid #333;
            position: relative;
        }
        .fs-icon::before, .fs-icon::after {
            content: ''; position: absolute; top: -2px; bottom: -2px;
            width: 2px; background: #333;
        }
        .fs-icon::before { left: 0; } .fs-icon::after { right: 0; }

        .progress-wrapper {
            flex: 1; height: 16px; background: #333;
            border: 1px solid #000; border-bottom: 1px solid #eee;
            position: relative; cursor: pointer;
        }
        .progress-filled { height: 100%; background: var(--retro-red); width: 0%; }
        .handle {
            position: absolute; top: -6px; left: 0; width: 32px; height: 26px;
            background: #d1d1d1; transform: translateX(-50%);
            clip-path: polygon(20% 0%, 80% 0%, 100% 50%, 80% 100%, 20% 100%, 0% 50%);
            border: 1px solid #444; pointer-events: none;
        }

        .time-display { font-family: 'Courier New', monospace; font-size: 15px; font-weight: bold; color: #222; white-space: nowrap; }

        .volume-group { display: flex; flex-direction: column; align-items: center; gap: 4px; min-width: 90px; }
        .vol-bars { display: flex; align-items: flex-end; gap: 2px; height: 16px; }
        .vol-bar { width: 3px; background: #777; }
        .vol-bar.active { background: #000; }
        .vol-slider { -webkit-appearance: none; width: 80px; height: 3px; background: #555; outline: none; border-bottom: 1px solid #fff; cursor: pointer; }
        .vol-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 9px; height: 12px; background: #999; border: 1px solid #444; }

        #restartOverlay {
            position: absolute; top:0; left:0; right:0; bottom:0;
            background: rgba(0,0,0,0.7); display: none;
            justify-content: center; align-items: center; z-index: 30;
        }
    </style>
</head>
<body>

<h1>Tyler's Web Video Player</h1>

<div class="import-section">
    <label class="file-label">Choose Video<input type="file" id="videoImport" accept="video/*"></label>
    <label class="file-label" style="background: #a3c2ff;">Choose Music<input type="file" id="audioImport" accept="audio/*"></label>
</div>

<div class="player-container" id="playerWrapper">
    <div id="loadingIcon"></div>
    
    <div id="settingsMenu">
        <div class="menu-item" id="loopToggle">Loop <span>OFF</span></div>
        <div class="menu-item" id="aboutBtn">About</div>
        <div class="menu-item" onclick="location.reload()">Reset Player</div>
    </div>

    <div id="restartOverlay">
        <div class="btn-circle" id="restartAction" style="width:70px; height:70px;">
            <div class="play-icon" style="border-left-width:25px; border-top-width:15px; border-bottom-width:15px;"></div>
        </div>
    </div>

    <video id="mainVideo" playsinline></video>
    
    <div class="controls" id="controlBar">
        <button class="btn-circle" id="playBtn"><div id="playIcon" class="play-icon"></div></button>
        <button class="btn-small" id="stopBtn"><div class="stop-square"></div></button>
        <button class="btn-small" id="prevBtn" onclick="video.currentTime -= 5">&lt;</button>
        <button class="btn-small" id="nextBtn" onclick="video.currentTime += 5">&gt;</button>
        <div class="time-display"><span id="current">00:00</span> / <span id="total">0:00</span></div>
        <div class="progress-wrapper" id="progCont"><div class="progress-filled" id="progFill"></div><div class="handle" id="handle"></div></div>
        <div class="volume-group"><div class="vol-bars" id="volBars"></div><input type="range" class="vol-slider" id="volInput" min="0" max="1" step="0.01" value="1"></div>
        <button class="btn-small" id="settingsBtn">⚙</button>
        <button class="btn-small" id="fsToggleBtn" title="Fullscreen"><div class="fs-icon"></div></button>
    </div>
</div>

<script>
    const video = document.getElementById('mainVideo');
    const wrapper = document.getElementById('playerWrapper');
    const controlBar = document.getElementById('controlBar');
    const playIcon = document.getElementById('playIcon');
    const progFill = document.getElementById('progFill');
    const handle = document.getElementById('handle');
    const volBars = document.getElementById('volBars');
    const volInput = document.getElementById('volInput');
    const settingsMenu = document.getElementById('settingsMenu');
    const loopToggle = document.getElementById('loopToggle');
    const restartOverlay = document.getElementById('restartOverlay');
    const loadingIcon = document.getElementById('loadingIcon');

    let hideTimeout;

    for(let i=1; i<=12; i++) {
        let bar = document.createElement('div');
        bar.className = 'vol-bar active';
        bar.style.height = (i * 1.3 + 2) + 'px';
        volBars.appendChild(bar);
    }

    // LOADING LOGIC
    video.onwaiting = () => loadingIcon.style.display = 'block';
    video.onplaying = () => loadingIcon.style.display = 'none';
    video.oncanplay = () => loadingIcon.style.display = 'none';
    video.onloadstart = () => loadingIcon.style.display = 'block';

    document.getElementById('settingsBtn').addEventListener('click', (e) => {
        e.stopPropagation();
        settingsMenu.style.display = settingsMenu.style.display === 'block' ? 'none' : 'block';
    });

    loopToggle.addEventListener('click', () => {
        video.loop = !video.loop;
        loopToggle.querySelector('span').innerText = video.loop ? 'ON' : 'OFF';
        settingsMenu.style.display = 'none';
    });

    document.getElementById('aboutBtn').onclick = () => {
        alert("--- Tyler's Web Video Player v1.0 ---\n\nTITLE: Media Player Simulator\nGENRE: Utility / Retro Sandbox\nDEVELOPER: Tyler & Gemini AI\nENGINE: HTML5 / JavaScript / CSS3\nFEATURES:\n- Custom File Injection\n- Loading Buffer Indicator\n- Full HUD Auto-Hide\n- Retro OS Styling");
        settingsMenu.style.display = 'none';
    };

    video.addEventListener('click', () => {
        settingsMenu.style.display = 'none';
        if (controlBar.classList.contains('hidden')) showControls(); else hideControls();
    });

    function showControls() { controlBar.classList.remove('hidden'); resetTimer(); }
    function hideControls() { controlBar.classList.add('hidden'); settingsMenu.style.display = 'none'; clearTimeout(hideTimeout); }
    function resetTimer() { clearTimeout(hideTimeout); if (!video.paused) hideTimeout = setTimeout(hideControls, 7000); }

    function setupMedia(input) {
        if (input.files[0]) {
            video.src = URL.createObjectURL(input.files[0]);
            restartOverlay.style.display = 'none';
            video.play();
            updateIcon(true);
            showControls();
        }
    }

    document.getElementById('videoImport').addEventListener('change', function() { setupMedia(this); });
    document.getElementById('audioImport').addEventListener('change', function() { setupMedia(this); });

    function updateIcon(playing) {
        if (playing) {
            playIcon.className = "pause-icon";
            playIcon.innerHTML = '<div class="pause-bar"></div><div class="pause-bar"></div>';
        } else {
            playIcon.className = "play-icon";
            playIcon.innerHTML = '';
        }
    }

    document.getElementById('playBtn').addEventListener('click', (e) => {
        e.stopPropagation();
        if (video.paused) { video.play(); updateIcon(true); resetTimer(); }
        else { video.pause(); updateIcon(false); showControls(); }
    });

    document.getElementById('stopBtn').addEventListener('click', (e) => {
        e.stopPropagation();
        video.pause(); video.currentTime = 0; updateIcon(false);
    });

    volInput.addEventListener('input', (e) => {
        video.volume = e.target.value;
        document.querySelectorAll('.vol-bar').forEach((b, i) => b.classList.toggle('active', i < video.volume * 12));
    });

    video.addEventListener('timeupdate', () => {
        const percent = (video.currentTime / video.duration) * 100;
        progFill.style.width = `${percent}%`;
        handle.style.left = `${percent}%`;
        document.getElementById('current').textContent = formatTime(video.currentTime);
        if(!isNaN(video.duration)) document.getElementById('total').textContent = formatTime(video.duration);
    });

    document.getElementById('progCont').addEventListener('click', (e) => {
        e.stopPropagation();
        const rect = e.currentTarget.getBoundingClientRect();
        video.currentTime = ((e.clientX - rect.left) / rect.width) * video.duration;
    });

    video.addEventListener('ended', () => { if(!video.loop) { restartOverlay.style.display = 'flex'; hideControls(); } });

    document.getElementById('restartAction').addEventListener('click', () => {
        video.currentTime = 0; video.play();
        restartOverlay.style.display = 'none';
        updateIcon(true); showControls();
    });

    document.getElementById('fsToggleBtn').addEventListener('click', (e) => {
        e.stopPropagation();
        if (!document.fullscreenElement) wrapper.requestFullscreen(); else document.exitFullscreen();
    });

    function formatTime(s) {
        let m = Math.floor(s / 60);
        let sec = Math.floor(s % 60);
        return `${m}:${sec.toString().padStart(2, '0')}`;
    }
</script>

</body>
</html>
